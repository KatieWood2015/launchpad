name: Launchpad Daily Digest

on:
  schedule:
    - cron: '0 15 * * 1-5'  # 7:00 AM PT, Mon–Fri
  workflow_dispatch:          # Manual trigger from GitHub UI

jobs:
  daily:
    runs-on: ubuntu-latest
    env:
      # Use Node 24 for JS-based actions before the June 2026 default (see GitHub changelog).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Verify Node 24 runtime
        run: |
          node -v
          node -e "const major = Number(process.versions.node.split('.')[0]); if (major < 24) { throw new Error(`Expected Node >=24, got ${process.version}`) }"

      - run: npm install

      - name: Load profile
        if: ${{ env.DATABASE_URL == '' }}
        env:
          LAUNCHPAD_PROFILE: ${{ secrets.LAUNCHPAD_PROFILE }}
        run: |
          mkdir -p config
          if [ -z "$LAUNCHPAD_PROFILE" ]; then
            echo "LAUNCHPAD_PROFILE is empty and DATABASE_URL is not configured."
            echo "Set secrets.DATABASE_URL to use app-stored profile data."
            exit 1
          fi
          # Avoid shell-quoting bugs: echo '...' breaks if JSON contains apostrophes (e.g. O'Brien).
          printf '%s' "$LAUNCHPAD_PROFILE" > config/profile.json
          node -e "const fs=require('fs'); JSON.parse(fs.readFileSync('config/profile.json','utf8')); console.log('profile.json: valid JSON')"

      - name: Run Launchpad
        run: node src/lib/daily.js

      - name: Save output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: launchpad-${{ github.run_id }}
          path: output/
          retention-days: 7
